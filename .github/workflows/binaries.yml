name: Build & Release Binaries

on:
  release:
    types: [published]

permissions:
  contents: write # upload release assets

jobs:
  build:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── macOS ──────────────────────────────────────────────────────────
          - platform: darwin-arm64
            runner: macos-latest
            target: bun-darwin-arm64
            binary: lucerna-darwin-arm64

          - platform: darwin-x64
            runner: macos-13
            target: bun-darwin-x64
            binary: lucerna-darwin-x64

          # ── Linux (glibc) ──────────────────────────────────────────────────
          - platform: linux-x64
            runner: ubuntu-latest
            target: bun-linux-x64
            binary: lucerna-linux-x64

          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            target: bun-linux-arm64
            binary: lucerna-linux-arm64

          # ── Linux (musl / Alpine) ─────────────────────────────────────────
          # oven/bun:1 is Alpine-based; pnpm install picks up musl .node files.
          - platform: linux-x64-musl
            runner: ubuntu-latest
            container: oven/bun:1
            target: bun-linux-x64-musl
            binary: lucerna-linux-x64-musl

          - platform: linux-arm64-musl
            runner: ubuntu-24.04-arm
            container: oven/bun:1
            target: bun-linux-arm64-musl
            binary: lucerna-linux-arm64-musl

          # ── Windows ───────────────────────────────────────────────────────
          - platform: windows-x64
            runner: windows-latest
            target: bun-windows-x64
            binary: lucerna-windows-x64.exe

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - uses: actions/checkout@v6.0.2

      # ── Toolchain setup (skip for musl containers — bun is pre-installed) ──
      - name: Set up pnpm (non-musl)
        if: ${{ !matrix.container }}
        uses: pnpm/action-setup@v5.0.0
        with:
          version: "10"
          cache: true

      - name: Set up Bun (non-musl)
        if: ${{ !matrix.container }}
        uses: oven-sh/setup-bun@v2.2.0

      - name: Set up pnpm in musl container
        if: ${{ matrix.container }}
        run: npm install -g pnpm@10.29.2

      - name: Install gh CLI in musl container
        if: ${{ matrix.container }}
        run: apk add --no-cache github-cli

      # ── Dependencies ────────────────────────────────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Build ───────────────────────────────────────────────────────────────
      # --bytecode is omitted: it causes a runtime crash with the mixed
      # CJS/ESM native addon modules in this project (tested on Bun 1.3.11).
      - name: Build binary
        run: |
          mkdir -p bin
          bun build --compile --minify --sourcemap \
            src/cli/index.ts \
            --target=${{ matrix.target }} \
            --outfile=bin/${{ matrix.binary }}

      # ── Smoke test ──────────────────────────────────────────────────────────
      - name: Smoke test binary
        # musl binaries run fine inside the Alpine container;
        # non-musl binaries run on their native OS runner.
        run: bun test src/tests/binary.smoke.test.ts
        env:
          BINARY_PATH: bin/${{ matrix.binary }}

      # ── Upload to GitHub Release ─────────────────────────────────────────────
      - name: Upload binary to release
        run: gh release upload "${{ github.ref_name }}" "bin/${{ matrix.binary }}" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
