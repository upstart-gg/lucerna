name: CodeQL Security Analysis

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**/*.ts"
      - "**/*.js"
      - "**/*.json"
  schedule:
    - cron: "0 4 * * 1" # Weekly on Monday at 04:00 UTC

permissions: read-all

jobs:
  analyze:
    name: Analyze (JavaScript/TypeScript)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' ||
      !startsWith(github.event.pull_request.title, 'chore: version packages')
    permissions:
      actions: read
      contents: read
      security-events: write # upload SARIF results to the Security tab
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v6.0.0
        with:
          version: "10"
          cache: true

      - uses: oven-sh/setup-bun@v2.2.0

      - run: pnpm install --frozen-lockfile

      - uses: github/codeql-action/init@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3.35.1
        with:
          languages: javascript-typescript
          queries: security-extended

      - run: pnpm build

      - uses: github/codeql-action/analyze@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3.35.1
        with:
          category: "/language:javascript-typescript"
