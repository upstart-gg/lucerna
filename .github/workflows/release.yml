name: Release

on:
  push:
    branches: [main]

# Prevent concurrent runs so a version bump and a publish don't race.
concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write       # push version commit, create git tags + GitHub Releases
  pull-requests: write  # open / update the "Version Packages" PR
  id-token: write       # npm SLSA provenance

jobs:
  release:
    name: Version or Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history required for changeset detection

      - uses: pnpm/action-setup@v5.0.0
        with:
          version: "10"
          cache: true

      - uses: oven-sh/setup-bun@v2.2.0

      # setup-node configures ~/.npmrc so NODE_AUTH_TOKEN is used for publish
      - uses: actions/setup-node@v6.3.0
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      # On every push to main:
      #   • If changeset files exist  → create / update the "Version Packages" PR
      #   • If no changeset files left → run publish, create git tags + GitHub Releases
      - uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        with:
          version: pnpm changeset:version
          publish: pnpm changeset:publish
          title: "chore: version packages"
          commit: "chore: version packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
