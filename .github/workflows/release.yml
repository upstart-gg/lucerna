name: Release

on:
  push:
    branches: [main]

permissions: read-all

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: write       # push version commit to main
      pull-requests: write  # open / update the version PR
      id-token: write       # npm SLSA provenance
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0    # full history needed for changeset detection

      - uses: pnpm/action-setup@v6.0.0

      - uses: oven-sh/setup-bun@v2.2.0

      # setup-node is required to configure ~/.npmrc for NODE_AUTH_TOKEN
      - uses: actions/setup-node@v6.3.0
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        with:
          publish: pnpm changeset:publish
          version: pnpm changeset:version
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
