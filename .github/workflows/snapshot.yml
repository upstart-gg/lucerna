name: Snapshot Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions: read-all

jobs:
  snapshot:
    name: Publish Canary Snapshot
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.merged == true &&
      !startsWith(github.event.pull_request.title, 'chore: version packages')
    permissions:
      contents: read
      pull-requests: write  # post install instructions as a PR comment
      id-token: write       # npm SLSA provenance
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v6.0.0

      - uses: oven-sh/setup-bun@v2.2.0

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Check for pending changesets
        id: check
        run: |
          COUNT=$(ls .changeset/*.md 2>/dev/null | grep -v README | wc -l | tr -d ' ')
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Compute short SHA
        if: steps.check.outputs.count > 0
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Publish canary snapshot
        if: steps.check.outputs.count > 0
        run: |
          pnpm changeset version --snapshot ${{ steps.sha.outputs.short }}
          pnpm changeset publish --tag canary --no-git-tag
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      - name: Get published version
        if: steps.check.outputs.count > 0
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Post PR comment
        if: steps.check.outputs.count > 0
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const version = '${{ steps.version.outputs.version }}';
            const sha = '${{ steps.sha.outputs.short }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: [
                '## Canary Release Published',
                '',
                'A canary snapshot for this PR has been published to npm.',
                '',
                '**Install:**',
                '```sh',
                `npm install @upstart.gg/lucerna@${version}`,
                '# or',
                'npm install @upstart.gg/lucerna@canary',
                '```',
                '',
                `**Tag:** \`canary\` | **SHA:** \`${sha}\` | **Version:** \`${version}\``,
              ].join('\n'),
            });
