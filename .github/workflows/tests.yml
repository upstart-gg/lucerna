name: Tests

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"
      - "biome.json"
      - "tsdown.config.ts"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"
      - "biome.json"
      - "tsdown.config.ts"
      - ".github/workflows/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Build, Lint, Typecheck & Test
    runs-on: ubuntu-latest
    if: "github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore: version packages')"
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: pnpm/action-setup@v5.0.0
        with:
          version: "10"
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: oven-sh/setup-bun@v2.2.0
      - run: pnpm install
      - run: pnpm build
      - run: pnpm ci:lint
      - run: pnpm typecheck
      - run: pnpm ci:test
      - run: pnpm test:dist

  integration-test:
    name: Integration Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Run on push to main, or on PRs from the same repo (forks don't have secret access)
    if: "(github.event_name == 'push' && !startsWith(github.event.head_commit.message, 'chore: version packages')) || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false)"
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: pnpm/action-setup@v5.0.0
        with:
          version: "10"
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: oven-sh/setup-bun@v2.2.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test:integration
        env:
          INTEGRATION_TESTS: "1"
          # Add secret-backed env vars here, e.g.:
          # CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
